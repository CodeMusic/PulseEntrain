ermes-compiler, which can be version-skewed -> \"Wrong bytecode version\" crash on launch). No-op for source builds, which have no destroot hermesc.\nif [ -f \"${PODS_ROOT}/hermes-engine/destroot/bin/hermesc\" ]; then\n  export HERMES_CLI_PATH=\"${PODS_ROOT}/hermes-engine/destroot/bin/hermesc\"\nfi\n\n`\"$NODE_BINARY\" --print \"require('path').dirname(require.resolve('react-native/package.json')) + '/scripts/react-native-xcode.sh'\"`\n\n\n";
